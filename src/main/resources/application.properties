# ============================================
# RAG Core Engine - Application Configuration
# ============================================

# Server
server.port=8080

# Actuator (health endpoint)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# OpenAI API Key ? read from environment variable, NEVER hardcode
# Set via: export OPENAI_API_KEY=sk-your-key-here
openai.api.key=${OPENAI_API_KEY:}

# OpenAI Model Configuration
openai.embedding.model=text-embedding-3-small
openai.chat.model=gpt-4o-mini

# API Key Authentication
# Set via: export RAG_API_KEY=your-secret-key-here
# If left blank, the security filter is disabled (development mode only).
api.security.key=${RAG_API_KEY:}

# File upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# SQLite persistent vector store
sqlite.db.path=rag-store.db